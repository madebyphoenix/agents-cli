<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" role="img" aria-label="How agents-cli resolves secrets: stripe.yml points to the macOS Keychain; agents-cli reads both at runtime and injects the resolved env into the child process">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#101010" stroke-width="1"/>
    </pattern>
    <marker id="arrow-lime" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B6E84A"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a5a5a"/>
    </marker>
    <marker id="dot-lime" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="6" markerHeight="6">
      <circle cx="3" cy="3" r="2.5" fill="#B6E84A"/>
    </marker>
    <style><![CDATA[
      .title       { font: 500 24px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; fill: #e8e8e8; letter-spacing: -0.01em; }
      .subtitle    { font: 400 15px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; fill: #7a7a7a; }
      .section     { font: 600 11px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; letter-spacing: 0.28em; fill: #4a4a4a; }
      .cardtitle   { font: 600 18px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; fill: #e8e8e8; }
      .cardmeta    { font: 500 11px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; letter-spacing: 0.14em; fill: #5a5a5a; }
      .mono        { font: 500 16px ui-monospace, "SF Mono", Menlo, monospace; fill: #e8e8e8; }
      .mono-muted  { font: 500 16px ui-monospace, "SF Mono", Menlo, monospace; fill: #7a7a7a; }
      .mono-faint  { font: 400 16px ui-monospace, "SF Mono", Menlo, monospace; fill: #4a4a4a; }
      .mono-accent { font: 500 16px ui-monospace, "SF Mono", Menlo, monospace; fill: #B6E84A; }
      .mono-big-accent { font: 500 19px ui-monospace, "SF Mono", Menlo, monospace; fill: #B6E84A; }
      .mono-big    { font: 500 19px ui-monospace, "SF Mono", Menlo, monospace; fill: #e8e8e8; }
      .note        { font: 400 13px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; fill: #5a5a5a; }
      .edgelabel   { font: 500 10px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; letter-spacing: 0.16em; fill: #8FBF3A; }
      .edgelabel-muted { font: 500 10px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; letter-spacing: 0.16em; fill: #5a5a5a; }
      .nodetitle   { font: 600 17px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; fill: #e8e8e8; }
      .nodedesc    { font: 400 13px -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; fill: #8a8a8a; }
      .kbd         { font: 500 13px ui-monospace, "SF Mono", Menlo, monospace; fill: #7a7a7a; }
    ]]></style>
  </defs>

  <rect width="1200" height="880" fill="#050505"/>
  <rect width="1200" height="880" fill="url(#grid)" opacity="0.5"/>

  <text x="60" y="56" class="title">How a secret travels from your Keychain to your agent</text>
  <text x="60" y="82" class="subtitle">The YAML holds a pointer.  The Keychain holds the value.  agents-cli bridges them at runtime.</text>

  <text x="60" y="142" class="section">AT REST — TWO STORES, ONE REFERENCE</text>

  <rect x="60" y="170" width="500" height="300" rx="14" fill="#0d0d0d" stroke="#262626" stroke-width="1"/>
  <text x="84" y="206" class="cardtitle">stripe.yml</text>
  <text x="540" y="206" text-anchor="end" class="cardmeta">GIT-SAFE</text>
  <line x1="84" y1="224" x2="540" y2="224" stroke="#1a1a1a" stroke-width="1"/>
  <text x="84" y="262" class="mono-muted">name:</text>
  <text x="160" y="262" class="mono">stripe</text>
  <text x="84" y="294" class="mono-muted">vars:</text>
  <text x="108" y="326" class="mono">STRIPE_KEY:</text>
  <text x="260" y="326" class="mono-accent">keychain:STRIPE_KEY</text>
  <text x="108" y="358" class="mono">TEST_CARD:</text>
  <text x="260" y="358" class="mono-faint">&quot;4242 4242 4242 4242&quot;</text>
  <text x="84" y="416" class="note">Pointers only — no secret ever touches your repo.</text>
  <text x="84" y="436" class="note">Commit, share, or sync across machines.</text>

  <rect x="640" y="170" width="500" height="300" rx="14" fill="#0d0d0d" stroke="#262626" stroke-width="1"/>
  <text x="664" y="206" class="cardtitle">macOS Keychain</text>
  <text x="1120" y="206" text-anchor="end" class="cardmeta">ENCRYPTED · LOGIN-SCOPED</text>
  <line x1="664" y1="224" x2="1120" y2="224" stroke="#1a1a1a" stroke-width="1"/>
  <text x="664" y="262" class="mono-muted">service</text>
  <text x="688" y="294" class="mono-accent">agents-cli.secrets.stripe.STRIPE_KEY</text>
  <text x="664" y="334" class="mono-muted">data</text>
  <text x="688" y="366" class="mono-accent">sk_live_abc123…</text>
  <text x="664" y="416" class="note">The OS encrypts it at rest. Only your login session</text>
  <text x="664" y="436" class="note">can unlock it. Never on disk in plaintext.</text>

  <path d="M 478 326 C 560 326, 600 294, 688 294" stroke="#B6E84A" stroke-dasharray="5 4" fill="none" stroke-width="1.75" marker-end="url(#arrow-lime)" marker-start="url(#dot-lime)"/>
  <rect x="535" y="270" width="110" height="24" rx="12" fill="#050505" stroke="#262626" stroke-width="1"/>
  <text x="590" y="286" text-anchor="middle" class="edgelabel">RESOLVES TO</text>

  <line x1="60" y1="524" x2="1140" y2="524" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="60" y="512" class="section">AT RUN TIME — RESOLUTION &amp; INJECTION</text>

  <path d="M 310 470 C 310 548, 400 580, 460 614" stroke="#5a5a5a" fill="none" stroke-width="1.25" marker-end="url(#arrow-muted)"/>
  <path d="M 890 470 C 890 548, 800 580, 740 614" stroke="#B6E84A" fill="none" stroke-width="1.5" marker-end="url(#arrow-lime)"/>

  <text x="236" y="552" class="edgelabel-muted">1 · READS REFS</text>
  <text x="838" y="552" class="edgelabel">2 · FETCHES VALUES</text>

  <rect x="360" y="616" width="480" height="156" rx="14" fill="#0d0d0d" stroke="#262626" stroke-width="1"/>
  <text x="384" y="654" class="cardtitle">agents-cli</text>
  <text x="384" y="676" class="nodedesc">resolves refs · merges env · enforces precedence</text>
  <line x1="384" y1="690" x2="816" y2="690" stroke="#1a1a1a"/>
  <text x="384" y="714" class="kbd">$</text>
  <text x="400" y="714" class="mono" style="font-size:14px">agents run claude &quot;charge a card&quot;</text>
  <text x="682" y="714" class="mono-accent" style="font-size:14px">--secrets stripe</text>
  <g transform="translate(384, 748)">
    <text x="0" y="0" class="mono-accent" style="font-size:13px">profile</text>
    <text x="52" y="0" class="mono-muted" style="font-size:13px">&lt;</text>
    <text x="66" y="0" class="mono-accent" style="font-size:13px">--secrets</text>
    <text x="144" y="0" class="mono-muted" style="font-size:13px">&lt;</text>
    <text x="158" y="0" class="mono-accent" style="font-size:13px">--env K=V</text>
    <text x="244" y="0" class="nodedesc" style="font-size:12px">rightmost wins · missing ref aborts before spawn</text>
  </g>

  <path d="M 600 772 L 600 812" stroke="#B6E84A" fill="none" stroke-width="1.75" marker-end="url(#arrow-lime)"/>
  <rect x="534" y="782" width="132" height="22" rx="11" fill="#050505" stroke="#262626" stroke-width="1"/>
  <text x="600" y="797" text-anchor="middle" class="edgelabel">3 · INJECTED AS ENV</text>

  <rect x="240" y="812" width="720" height="56" rx="14" fill="#0d0d0d" stroke="#262626" stroke-width="1"/>
  <text x="266" y="848" class="mono-big">claude</text>
  <text x="362" y="848" class="mono" style="font-size:18px">env.</text>
  <text x="410" y="848" class="mono-big-accent">STRIPE_KEY</text>
  <text x="538" y="848" class="mono-big">= sk_live_abc123…</text>
  <text x="840" y="848" class="mono-faint" style="font-size:14px">child process only</text>
</svg>
