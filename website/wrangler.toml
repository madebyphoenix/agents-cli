# Matches the existing Cloudflare Worker name so `wrangler deploy` replaces
# the currently-serving deployment atomically on the same zone.
name = "agents-cli-sh"
main = "src/index.ts"
compatibility_date = "2026-04-20"

[[routes]]
pattern = "agents-cli.sh/*"
zone_name = "agents-cli.sh"

# Observability so UA-sniff outcomes + request counts are visible in the CF
# dashboard without needing a separate logging pipeline.
[observability]
enabled = true
